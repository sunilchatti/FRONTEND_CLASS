<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>VPS Men's PG</h3>
    <hr>
    <fieldset>
    <legend>REGISTRATION FORM</legend>
    <form action="#" method="post">
        <label for="first name">FIRST NAME:</label>
        <input type="text" placeholder="Enter your first name" id="first name">
        <br>
        <label for="middle name">MIDDLE NAME:</label>
        <input type="text" placeholder="Enter your middle name" id="middle name">
        <br>
        <label for="last name">LAST NAME:</label>
        <input type="text" placeholder="Enter your last name" id="last name">
        <br>
        <label for="email">EMAIL:</label>
        <input type="email" id="email">
        <br>
        <label for="password">PASSWORD:</label>
        <input type="password" id="password">
        <br>
        <label for="age">AGE:</label>
        <input type="number" id="age">
        <br>
        <label for="phno">PH NO:</label>
        <input type="tel" id="phno" value="+91">
        <br>
        <label for="DOB">DOB:</label>
        <input type="date" id="DOB">
    </form>
    </fieldset>
</body>
</html>
